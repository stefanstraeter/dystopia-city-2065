<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />

    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />
    <link rel="preload" href="./assets/fonts/ByteBounce.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="./assets/fonts/CyberwayRiders.woff2" as="font" type="font/woff2" crossorigin />

    <title>Neon City 2065</title>

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/style.css" />

    <script src="models/drawable-object.class.js" defer></script>
    <script src="models/moveable-object.class.js" defer></script>

    <script src="models/audio-manager.class.js" defer></script>
    <script src="models/camera.class.js" defer></script>
    <script src="models/keyboard.class.js" defer></script>
    <script src="models/ui-manager.class.js" defer></script>
    <script src="models/level-populator.class.js" defer></script>

    <script src="models/status-bar.class.js" defer></script>
    <script src="models/throwable-object.class.js" defer></script>
    <script src="models/items.class.js" defer></script>
    <script src="models/background-object.class.js" defer></script>
    <script src="models/neon-signs.class.js" defer></script>
    <script src="models/flying-vehicles.class.js" defer></script>

    <script src="models/character.class.js" defer></script>
    <script src="models/spider.class.js" defer></script>
    <script src="models/sentry-drone.class.js" defer></script>
    <script src="models/endboss.class.js" defer></script>

    <script src="js/level1.js" defer></script>

    <script src="models/collision-manager.class.js" defer></script>
    <script src="models/world.class.js" defer></script>

    <script src="js/preloader.js"></script>
    <script src="js/game.js" defer></script>
  </head>

  <body>
    <div class="game-container">
      <canvas id="canvas" class="game-canvas" width="800" height="450"></canvas>

      <div class="mobile-controls-overlay">
        <div class="controls-group movement-btns">
          <button id="btn-left" class="ctrl-btn btn-neon-blue">◀</button>
          <button id="btn-right" class="ctrl-btn btn-neon-blue">▶</button>
        </div>

        <div class="controls-group system-btns">
          <button id="btn-mission" class="ctrl-btn-small btn-neon-yellow">M</button>
          <button id="btn-controls" class="ctrl-btn-small btn-neon-yellow">C</button>
        </div>

        <div class="controls-group action-btns">
          <button id="btn-jump" class="ctrl-btn btn-neon-pink">JUMP</button>
          <button id="btn-shoot" class="ctrl-btn btn-neon-pink">SHOOT</button>
        </div>
      </div>

      <div class="orientation-overlay">
        <p>PLEASE ROTATE YOUR DEVICE</p>
      </div>
    </div>

    <button class="btn-fullscreen" onclick="toggleFullscreen()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 10l8 -8m0 0h-6m6 0v6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
        <path d="M10 14l-8 8m0 0h6m-6 0v-6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="none" />
      </svg>
    </button>
  </body>
</html>
