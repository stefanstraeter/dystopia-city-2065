<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Neon City 2065" />

    <link rel="icon" type="image/svg+xml" href="./assets/favicon/favicon.svg" />
    <link rel="icon" type="image/x-icon" href="./assets/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-touch-icon.png" />

    <title>Neon City 2065</title>

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/fonts.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <link rel="stylesheet" href="styles/mobile.css" />

    <script src="models/base/drawable-object.class.js"></script>
    <script src="models/base/moveable-object.class.js"></script>

    <script src="models/managers/audio-manager.class.js"></script>
    <script src="models/managers/collision-manager.class.js"></script>
    <script src="models/managers/status-bar.class.js"></script>
    <script src="models/managers/ui-manager.class.js"></script>

    <script src="models/environment/background-object.class.js"></script>
    <script src="models/environment/flying-vehicles.class.js"></script>
    <script src="models/environment/items.class.js"></script>
    <script src="models/environment/neon-signs.class.js"></script>

    <script src="models/entities/character.class.js"></script>
    <script src="models/entities/endboss.class.js"></script>
    <script src="models/entities/sentry-drone.class.js"></script>
    <script src="models/entities/spider.class.js"></script>
    <script src="models/entities/throwable-object.class.js"></script>

    <script src="models/core/camera.class.js"></script>
    <script src="models/core/keyboard.class.js"></script>
    <script src="models/core/game-state-manager.class.js"></script>
    <script src="models/core/level-populator.class.js"></script>
    <script src="models/core/world.class.js"></script>

    <script src="js/preloader.js"></script>
    <script src="js/mobile-controls.js"></script>
    <script src="js/level1.js"></script>
    <script src="js/game.js"></script>
  </head>

  <body>
    <div class="game-container">
      <canvas id="canvas" class="game-canvas" width="800" height="450"></canvas>

      <div class="controls-group system-btns">
        <button id="btn-mission" class="ctrl-btn-small btn-neon-yellow">M</button>
        <button id="btn-controls" class="ctrl-btn-small btn-neon-yellow">C</button>
        <button id="btn-fullscreen-mobile" class="ctrl-btn-small btn-neon-yellow" onclick="toggleFullscreen()">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="width: 1.2rem; height: 1.2rem">
            <path d="M14 10l8 -8m0 0h-6m6 0v6M10 14l-8 8m0 0h6m-6 0v-6" stroke="currentColor" stroke-width="2" fill="none" />
          </svg>
        </button>
      </div>

      <div class="mobile-controls-overlay">
        <div class="controls-group movement-btns">
          <button id="btn-left" class="ctrl-btn btn-neon-blue">←</button>
          <button id="btn-right" class="ctrl-btn btn-neon-blue">→</button>
        </div>
        <div class="controls-group action-btns">
          <button id="btn-jump" class="ctrl-btn btn-neon-pink">JUMP</button>
          <button id="btn-shoot" class="ctrl-btn btn-neon-pink">SHOOT</button>
        </div>
      </div>

      <div class="orientation-overlay">
        <p class="orientation-message">PLEASE ROTATE YOUR DEVICE...</p>
      </div>
    </div>

    <button class="btn-fullscreen" onclick="toggleFullscreen()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M14 10l8 -8m0 0h-6m6 0v6M10 14l-8 8m0 0h6m-6 0v-6" stroke="currentColor" stroke-width="2" fill="none" />
      </svg>
    </button>
  </body>
</html>
